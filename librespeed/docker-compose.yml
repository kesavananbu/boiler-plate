services:
  librespeed:
    image: lscr.io/linuxserver/librespeed:latest
    container_name: librespeed
    environment:
      #- PUID=1026
      #- PGID=100
      - TZ=Asia/Kolkata
      - PASSWORD=false
    volumes:
      - /volume1/docker/librespeed:/config
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 7070:80
    restart: unless-stopped
    network_mode: host
    #networks:
    #  - internal

#networks:
#    internal:
#      external: true
